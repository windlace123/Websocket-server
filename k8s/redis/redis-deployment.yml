apiVersion: apps/v1
kind: Deployment
metadata: 
  name: redis
spec:
  replicas: 1
  selector: 
    matchLabels: 
      app: redis
  template:
    metadata: 
      labels:
        app: redis
    spec:
      containers: 
        - name: redis
          image: redis:latest
          ports: 
            - containerPort: 6379
          args:
            - --requirepass
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom: 
                secretKeyRef: 
                  name: app-secrets
                  key: REDIS_PASS
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-data